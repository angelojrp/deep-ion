<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docs Viewer</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fb;
        color: #142033;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid #d9e2f0;
        padding: 16px;
        background: #ffffff;
        overflow: auto;
      }

      .sidebar h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .sidebar p {
        margin: 0 0 16px;
        color: #4f5e78;
        font-size: 14px;
      }

      .tree {
        font-size: 13px;
      }

      .tree-root,
      .tree-children {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .tree-item {
        margin: 4px 0;
      }

      .tree-children {
        margin-left: 10px;
        padding-left: 10px;
        border-left: 1px dashed #d5deeb;
        display: none;
      }

      .tree-item.dir.open > .tree-children {
        display: block;
      }

      .dir-toggle {
        width: 100%;
        border: none;
        background: transparent;
        padding: 4px 2px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #2f4266;
        border-radius: 6px;
        font-size: 13px;
        text-align: left;
      }

      .dir-toggle:hover {
        background: #f2f6fc;
      }

      .dir-chevron {
        width: 12px;
        color: #58709a;
        transition: transform 150ms ease;
      }

      .tree-item.dir.open > .dir-toggle .dir-chevron {
        transform: rotate(90deg);
      }

      .dir-label {
        font-weight: 600;
      }

      .file-btn {
        display: block;
        width: 100%;
        text-align: left;
        border: 1px solid #dde5f3;
        border-radius: 8px;
        background: #f8fbff;
        color: #173160;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 13px;
      }

      .file-btn:hover {
        background: #edf4ff;
      }

      .file-btn.active {
        border-color: #4778d9;
        background: #e8f0ff;
      }

      .content {
        padding: 22px 28px;
        overflow: auto;
      }

      .content-card {
        max-width: 980px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d9e2f0;
        border-radius: 12px;
        padding: 24px;
      }

      .meta {
        margin-bottom: 20px;
      }

      .meta h2 {
        margin: 0;
        font-size: 20px;
      }

      .meta small {
        color: #5e6d88;
      }

      .empty {
        color: #546580;
      }

      .markdown h1,
      .markdown h2,
      .markdown h3 {
        margin-top: 1.2em;
      }

      .markdown code,
      .markdown pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      }

      .markdown pre {
        background: #101828;
        color: #e5ecf8;
        border-radius: 10px;
        padding: 12px;
        overflow-x: auto;
      }

      .markdown pre.mermaid {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .markdown table {
        border-collapse: collapse;
        width: 100%;
      }

      .markdown th,
      .markdown td {
        border: 1px solid #dbe3f1;
        padding: 6px 8px;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid #d9e2f0;
          max-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>Docs Viewer</h1>
        <p>Visualização dos arquivos Markdown de <strong>/docs</strong>.</p>
        <div id="tree" class="tree"></div>
      </aside>

      <main class="content">
        <section class="content-card">
          <div id="meta" class="meta">
            <h2>Selecione um documento</h2>
            <small>Escolha um arquivo na barra lateral para abrir.</small>
          </div>
          <article id="markdown" class="markdown empty"></article>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      const treeContainer = document.getElementById('tree');
      const meta = document.getElementById('meta');
      const markdown = document.getElementById('markdown');
      let activePath = null;

      if (window.mermaid) {
        window.mermaid.initialize({
          startOnLoad: false,
          securityLevel: 'strict',
        });
      }

      function createFileButton(node) {
        const button = document.createElement('button');
        button.className = 'file-btn';
        button.textContent = node.name;
        button.dataset.path = node.path;

        button.addEventListener('click', async () => {
          document.querySelectorAll('.file-btn.active').forEach((b) => b.classList.remove('active'));
          button.classList.add('active');
          activePath = node.path;
          await loadDoc(node.path);
        });

        return button;
      }

      function createDirectoryNode(node, depth) {
        const item = document.createElement('li');
        item.className = 'tree-item dir';

        if (depth <= 1) {
          item.classList.add('open');
        }

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'dir-toggle';
        toggle.setAttribute('aria-expanded', item.classList.contains('open') ? 'true' : 'false');

        const chevron = document.createElement('span');
        chevron.className = 'dir-chevron';
        chevron.textContent = '▶';

        const label = document.createElement('span');
        label.className = 'dir-label';
        label.textContent = `📁 ${node.name}`;

        toggle.appendChild(chevron);
        toggle.appendChild(label);
        item.appendChild(toggle);

        const children = document.createElement('ul');
        children.className = 'tree-children';
        renderTree(node.children, children, depth + 1);
        item.appendChild(children);

        toggle.addEventListener('click', () => {
          item.classList.toggle('open');
          toggle.setAttribute('aria-expanded', item.classList.contains('open') ? 'true' : 'false');
        });

        return item;
      }

      function createFileNode(node) {
        const item = document.createElement('li');
        item.className = 'tree-item file';
        item.appendChild(createFileButton(node));
        return item;
      }

      function renderTree(nodes, container, depth = 0) {
        nodes.forEach((node) => {
          if (node.type === 'directory') {
            container.appendChild(createDirectoryNode(node, depth));
            return;
          }

          if (node.type === 'file') {
            container.appendChild(createFileNode(node));
          }
        });
      }

      async function loadTree() {
        treeContainer.innerHTML = '';

        try {
          const response = await fetch('/api/tree');
          const data = await response.json();

          if (!data.tree || data.tree.length === 0) {
            treeContainer.innerHTML = '<p class="empty">Nenhum arquivo .md encontrado em /docs.</p>';
            return;
          }

          const treeRoot = document.createElement('ul');
          treeRoot.className = 'tree-root';
          renderTree(data.tree, treeRoot);
          treeContainer.appendChild(treeRoot);

          const firstFileButton = treeContainer.querySelector('.file-btn');
          if (firstFileButton) {
            firstFileButton.click();
          }
        } catch (error) {
          treeContainer.innerHTML = `<p class="empty">Erro ao carregar árvore: ${error}</p>`;
        }
      }

      async function loadDoc(filePath) {
        markdown.classList.remove('empty');
        markdown.innerHTML = 'Carregando...';

        try {
          const response = await fetch(`/api/doc?path=${encodeURIComponent(filePath)}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || 'Falha ao abrir documento');
          }

          meta.innerHTML = `<h2>${data.title}</h2><small>${data.path}</small>`;
          markdown.innerHTML = data.html;

          if (window.mermaid) {
            const diagrams = markdown.querySelectorAll('pre.mermaid');
            if (diagrams.length > 0) {
              try {
                await window.mermaid.run({ nodes: diagrams });
              } catch (error) {
                console.error('Falha ao renderizar Mermaid:', error);
              }
            }
          }
        } catch (error) {
          meta.innerHTML = '<h2>Erro</h2>';
          markdown.classList.add('empty');
          markdown.textContent = `Não foi possível abrir o arquivo: ${error}`;
        }
      }

      loadTree();
    </script>
  </body>
</html>
